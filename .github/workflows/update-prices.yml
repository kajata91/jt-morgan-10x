name: update-prices

on:
  schedule:
    # 정규장 중 약 2시간 간격 (KST 09:10 · 11:10 · 13:10 · 15:10 = UTC 00:10 · 02:10 · 04:10 · 06:10)
    - cron: "10 0 * * 1-5"
    - cron: "10 2 * * 1-5"
    - cron: "10 4 * * 1-5"
    - cron: "10 6 * * 1-5"
    # 장 마감 후 종가 확정 (KST 16:50 = UTC 07:50)
    - cron: "50 7 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch KRX prices via Naver
        run: python3 scripts/fetch_prices.py
      - name: Fetch TOP GUNS rankings (KR·US)
        run: python3 scripts/fetch_topguns.py || echo "topguns skipped"
      - name: Commit & push if changed
        run: |
          git config user.name "tenver-bot"
          git config user.email "actions@github.com"
          git add prices.js topguns.js
          if git diff --cached --quiet; then
            echo "No price changes."
          else
            git commit -m "시세 자동 갱신 $(date +'%Y-%m-%d') [skip ci]"
            git pull --rebase origin main || true
            git push
          fi

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JT Morgan 10X — 텐버</title>
<style>
  /* ============ MetaMint 문법의 다크 테마 ============ */
  :root {
    --bg: #0b0d0c;          /* 페이지 배경 */
    --card: #151817;        /* 카드 배경 */
    --card2: #1c201e;       /* 카드 내 강조 영역 */
    --line: #262b29;        /* 경계선 */
    --text: #e8ece9;        /* 본문 */
    --muted: #8a938e;       /* 보조 텍스트 */
    --green: #4ade80;       /* 상승·포인트 */
    --red: #f87171;         /* 하락·경고 */
    --amber: #fbbf24;       /* 주의 */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    padding: 20px; max-width: 1280px; margin: 0 auto;
  }
  a { color: inherit; text-decoration: none; }

  /* ---- 헤더 ---- */
  header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .logo {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(135deg, #14532d, #4ade80);
    display: flex; align-items: center; justify-content: center; font-weight: 800; color: #06130b; font-size: 18px;
  }
  .brand h1 { font-size: 20px; font-weight: 700; }
  .brand .sub { font-size: 12px; color: var(--muted); }
  .version { text-align: right; font-size: 12px; color: var(--muted); }
  .version b { color: var(--green); }

  /* ---- 시세 스트립 (기능 5) ---- */
  .strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; margin-bottom: 14px; }
  .strip .tick { padding: 14px 16px; background: var(--card); border-right: 1px solid var(--line); }
  .strip .tick:last-child { border-right: none; }
  .tick .n { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .tick .v { font-size: 20px; font-weight: 700; }
  .tick .c { font-size: 12px; margin-top: 3px; }
  .up { color: var(--green); } .down { color: var(--red); } .warn { color: var(--amber); } .flat { color: var(--muted); }

  /* ---- 경고 배너 ---- */
  .alert { background: rgba(251,191,36,.08); border: 1px solid rgba(251,191,36,.35); color: #fde68a; border-radius: 12px; padding: 12px 16px; font-size: 13px; line-height: 1.6; margin-bottom: 18px; }

  /* ---- 카드 공통 ---- */
  .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin-bottom: 14px; }
  .card h2 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .card .desc { font-size: 12px; color: var(--muted); margin-bottom: 14px; }

  /* ---- 주전 10 테이블 (기능 1+9) ---- */
  .tablewrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 640px; }
  th { text-align: left; color: var(--muted); font-weight: 500; font-size: 11px; padding: 8px 10px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  td { padding: 11px 10px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  .stock { font-weight: 700; }
  .stock .code { font-weight: 400; font-size: 11px; color: var(--muted); }
  .sector { font-size: 11px; color: var(--muted); }
  .num { font-variant-numeric: tabular-nums; white-space: nowrap; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .b-high { background: rgba(74,222,128,.12); color: var(--green); }
  .b-mid  { background: rgba(251,191,36,.12); color: var(--amber); }
  .thesis { font-size: 12px; color: var(--muted); max-width: 260px; }
  /* 달성률 게이지 (기능 9) */
  .gauge { width: 110px; }
  .gauge .bar { height: 6px; background: var(--card2); border-radius: 6px; overflow: hidden; }
  .gauge .fill { height: 100%; background: linear-gradient(90deg, #166534, var(--green)); border-radius: 6px; }
  .gauge .lbl { font-size: 10px; color: var(--muted); margin-top: 4px; }

  /* ---- 후보 10 ---- */
  .bench { list-style: none; }
  .bench li { display: flex; justify-content: space-between; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
  .bench li:last-child { border-bottom: none; }
  .bench .bn { font-weight: 600; white-space: nowrap; }
  .bench .bnote { color: var(--muted); font-size: 12px; text-align: right; }

  /* ---- 업무 일지 (기능 2) ---- */
  .journal .entry { padding: 12px 0; border-bottom: 1px solid var(--line); }
  .journal .entry:last-child { border-bottom: none; }
  .journal .jd { font-size: 11px; color: var(--green); margin-bottom: 3px; }
  .journal .jt { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .journal .jb { font-size: 12px; color: var(--muted); line-height: 1.6; }

  footer { font-size: 11px; color: var(--muted); line-height: 1.7; padding: 16px 4px 30px; border-top: 1px solid var(--line); margin-top: 10px; }

  /* ---- 모바일 (휴대폰) ---- */
  @media (max-width: 820px) {
    body { padding: 12px; }
    .grid { grid-template-columns: 1fr; }
    .brand h1 { font-size: 17px; }
    .tick .v { font-size: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="logo">10X</div>
    <div>
      <h1>JT Morgan 10X</h1>
      <div class="sub">텐버 (TENVER) — 텐배거 리서치 대시보드</div>
    </div>
  </div>
  <div class="version" id="version"></div>
</header>

<div class="strip" id="strip"></div>
<div class="alert" id="alert"></div>

<div class="card">
  <h2>주전 10종목 <span style="color:var(--muted);font-weight:400;font-size:12px">기능 1 · 9</span></h2>
  <div class="desc">기준가(2026-07-01 종가) 대비 목표 10배 — ★는 기준가 확정 대기 · 게이지는 목표가 대비 달성률</div>
  <div class="tablewrap">
    <table>
      <thead>
        <tr><th>종목</th><th>분야</th><th>기준가</th><th>현재가</th><th>목표가 (10배)</th><th>달성률</th><th>확신도</th><th>핵심 논거</th></tr>
      </thead>
      <tbody id="main10"></tbody>
    </table>
  </div>
</div>

<div class="grid">
  <div class="card">
    <h2>텐버 업무 일지 <span style="color:var(--muted);font-weight:400;font-size:12px">기능 2</span></h2>
    <div class="desc">한 일 · 반성 · 다음 할 일</div>
    <div class="journal" id="journal"></div>
  </div>
  <div class="card">
    <h2>후보 10종목 <span style="color:var(--muted);font-weight:400;font-size:12px">기능 4</span></h2>
    <div class="desc">주전 결원 시 승격 대기</div>
    <ul class="bench" id="bench10"></ul>
  </div>
</div>

<footer id="disclaimer"></footer>

<script src="data.js"></script>
<script>
  const D = TENVER_DATA;
  const won = n => n == null ? "—" : n.toLocaleString("ko-KR") + "원";

  // 버전 (기능 12)
  document.getElementById("version").innerHTML =
    `텐버 <b>${D.version}</b><br>최근 업데이트 ${D.updatedAt}<br><span style="font-size:11px">${D.updateNote}</span>`;

  // 시세 스트립 (기능 5)
  document.getElementById("strip").innerHTML = D.market.map(m => `
    <div class="tick">
      <div class="n">${m.name}</div>
      <div class="v">${m.value}</div>
      <div class="c ${m.dir}">${m.change}</div>
    </div>`).join("");

  // 경고 배너
  document.getElementById("alert").textContent = D.alert;

  // 주전 10 (기능 1 + 달성률 게이지 기능 9)
  document.getElementById("main10").innerHTML = D.main10.map(s => {
    const pct = s.currentPrice ? Math.min(100, s.currentPrice / s.targetPrice * 100) : (s.basePrice / s.targetPrice * 100);
    const badge = s.confidence === "상" ? "b-high" : "b-mid";
    return `<tr>
      <td class="stock">${s.name}${s.starred ? " ★" : ""}<br><span class="code">${s.code}</span></td>
      <td class="sector">${s.sector}</td>
      <td class="num">${won(s.basePrice)}</td>
      <td class="num">${s.currentPrice ? won(s.currentPrice) : "<span style='color:var(--muted)'>점검 대기</span>"}</td>
      <td class="num" style="color:var(--green)">${won(s.targetPrice)}</td>
      <td><div class="gauge"><div class="bar"><div class="fill" style="width:${pct.toFixed(1)}%"></div></div><div class="lbl">${pct.toFixed(1)}% / 100%</div></div></td>
      <td><span class="badge ${badge}">${s.confidence}</span></td>
      <td class="thesis">${s.thesis}</td>
    </tr>`;
  }).join("");

  // 후보 10 (기능 4)
  document.getElementById("bench10").innerHTML = D.bench10.map(b =>
    `<li><span class="bn">${b.name} <span style="color:var(--muted);font-weight:400;font-size:11px">${b.code}</span></span><span class="bnote">${b.note}</span></li>`
  ).join("");

  // 업무 일지 (기능 2)
  document.getElementById("journal").innerHTML = D.journal.map(j =>
    `<div class="entry"><div class="jd">${j.date}</div><div class="jt">${j.title}</div><div class="jb">${j.body}</div></div>`
  ).join("");

  // 면책
  document.getElementById("disclaimer").textContent = D.disclaimer;
</script>
</body>
</html>
